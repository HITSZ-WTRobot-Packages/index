name: Trigger cpkg index refresh

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    if: github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch refresh request to index repository
        env:
          INDEX_REPO_TOKEN: ${{ secrets.INDEX_REPO_DISPATCH_TOKEN }}
          INDEX_OWNER: ${{ github.repository_owner }}
          INDEX_REPO: index
        run: |
          set -euo pipefail
          if [ -z "${INDEX_REPO_TOKEN}" ]; then
            echo "INDEX_REPO_DISPATCH_TOKEN is required" >&2
            exit 1
          fi
          curl --fail --silent --show-error -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${INDEX_REPO_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${INDEX_OWNER}/${INDEX_REPO}/dispatches" \
            -d @- <<EOF
          {
            "event_type": "cpkg-index-refresh",
            "client_payload": {
              "repo": "${{ github.event.repository.name }}",
              "full_name": "${{ github.repository }}",
              "clone_url": "https://github.com/${{ github.repository }}.git",
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref }}",
              "ref_name": "${{ github.ref_name }}"
            }
          }
          EOF
